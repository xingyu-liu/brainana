# Read the Docs build configuration (https://docs.readthedocs.io/en/stable/config-file/v2.html)
version: "2"

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  # Docs-only install: no torch/SimpleITK/fireants etc., faster builds.
  commands:
    - pip install "sphinx>=7.0" "myst-parser>=2.0" "sphinx-rtd-theme>=2.0" "sphinx-copybutton"
    - pip install --no-deps .
    - sphinx-build -b html -c docs docs $READTHEDOCS_OUTPUT/html

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false
