# FastSurfer Recon - Default Configuration
# =========================================
#
# This file contains default configuration values for the
# FastSurfer surface reconstruction pipeline.
#
# Values can be overridden via command-line arguments.

# Atlas configuration
atlas:
  name: ARM2  # Atlas name (ARM2 for macaque, DKT for human)

# Processing options
processing:
  # Threading
  threads: 1
  parallel_hemis: true
  
  # Volume options
  hires_threshold: 0.999  # Voxel size threshold for hires mode
  hires: auto  # High-resolution mode. Use true/false to force, or 'auto' to detect from voxel size
  
  # Non-human options (for macaque processing)
  skip_cc: true            # Skip corpus callosum segmentation
  skip_talairach: true     # Skip Talairach registration (no eTIV)
  
  # Method choices
  use_fs_tessellation: false  # Use mri_mc (marching cubes) instead of mri_tesselate
  # use_fs_qsphere: false       # Use spectral projection instead of FS qsphere
  use_fs_aparc: false         # Use mapped parcellation instead of FS aparc
  do_surf_reg: false          # Surface registration to fsaverage
  
  # Additional options
  get_t1: false  # Create T1.mgz (for compatibility with downstream tools like fMRIPrep). If false, creates T1.mgz as symlink to nu.mgz (faster).
  atlas_3t: true  # Use 3T Talairach atlas instead of 1.5T
  
  # Bias correction parameters (N4)
  n4_shrink_factor: 4
  n4_num_iterations: 50
  n4_levels: 4
  
  # Surface smoothing and inflation (for monkey/non-human data)
  smooth_iterations: 20    # Smoothing iterations for smooth1 (Stage 09, before topology fix)
  inflate_iterations: 5   # Inflation iterations for inflate1 (Stage 10, before topology fix). For high-res data (0.75mm), use 20-50 or 100. None = FreeSurfer default ~15-20.
  inflate_no_save_sulc: true # Skip saving sulc file during inflation

  smooth2_iterations: 5     # Smoothing iterations for smooth2 (Stage 14, after topology fix, for visualization)
  inflate2_smooth_iterations: 50    # Smoothing iterations for inflate2 (Stage 14, after topology fix, for visualization)
  inflate2_iterations: 3    # Inflation iterations for inflate2 (Stage 14, after topology fix, for visualization)

# Registration template (optional). Path relative to banana repo root.
registration_template: template_zoo/fastsurfer/sub-MEBRAIN

# Output control
verbose: 1  # Verbosity level (0=WARNING, 1=INFO, 2=DEBUG)

