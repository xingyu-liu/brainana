# ============================================================================
# CONTINUAL LEARNING CONFIGURATION FOR FINETUNE_V5
# ============================================================================
# This config is optimized for continuing training from finetune_v3 model
# Key changes: much lower LR, preserved data split, careful scheduling
# ============================================================================

# REQUIRED PARAMETERS
modal: T1w
label: brainmask
experiment_name: continual_v3
dataset: /mnt/DataDrive3/xliu/monkey_training_groundtruth/training_data/T1w_brainmask/sample_balanced_nmax-1000.json

# OUTPUT CONFIGURATION
output_base_dir: /mnt/DataDrive3/xliu/monkey_training_groundtruth/training_output

# MODEL CONFIGURATION
num_input_slices: 3
num_conv_block: 5
kernel_root: 16
use_inst_norm: true
num_classes: 2
pretrained_model_path: /mnt/DataDrive3/xliu/monkey_training_groundtruth/unet_models/latest/T1w_brainmask.pth

# ============================================================================
# CONTINUAL LEARNING TRAINING CONFIGURATION
# ============================================================================
training_mode: continual_learning  # Training mode: 'scratch', 'fine_tuning', 'continual_learning'

num_epochs: 200  # Fewer epochs for continual learning
batch_size: 4
enable_dynamic_batch_sizing: true
learning_rate: null  # Use learning rate from checkpoint (preserves training state)
weight_decay: 0.00001

# Loss function - keep same as successful v3 training
loss_type: combined

# Learning rate scheduling - use cosine for smooth decay
use_cosine_scheduler: true
min_lr: 1e-08
warmup_epochs: 10  # Longer warmup for stability

# Training control - more conservative for continual learning
patience: 25  # More patience since improvements will be smaller
early_stopping_min_delta: 0.0001  # Smaller improvement threshold
early_stopping_restore_best_weights: true
dropout_rate: 0.1  # Reduce dropout since model is already well-trained
gradient_clip_norm: 0.3  # Tighter gradient clipping

# Advanced training features
mixed_precision: true
enable_augmentation: true

# ============================================================================
# DATA CONFIGURATION - CRITICAL: Same as v3 for consistency
# ============================================================================
rescale_dim: 256
validation_split: 0.15
test_split: 0.15
validation_frequency: 1
validation_metrics:
  dice: true
  iou: true
  precision: true
  recall: true
  hausdorff: true

# ============================================================================
# SYSTEM CONFIGURATION
# ============================================================================
device: auto
random_seed: 42  # CRITICAL: Use same seed as v3 for same data split
log_level: INFO

# ============================================================================
# MINIMAL AUGMENTATION FOR CONTINUAL LEARNING
# ============================================================================
augmentation_config:
  enable_flips: true
  enable_rotation: true
  enable_noise: true
  enable_brightness: true
  enable_field_bias: true
  rotation_angle: 180
  noise_std: 0.02
  brightness_range:
  - -0.2
  - 0.2
  contrast_range:
  - 0.8
  - 1.2
  bias_strength_range:
  - 0.15
  - 0.45
  spatial_freq_range:
  - 0.2
  - 0.7
  num_peaks_range:
  - 1
  - 3

# ============================================================================
# TRAINING LOGGING CONFIGURATION
# ============================================================================
enable_progress_bars: true
track_training_metrics: true
track_validation_metrics: true

# ============================================================================
# CONTINUAL LEARNING NOTES
# ============================================================================
# This configuration is explicitly set as CONTINUAL LEARNING via training_mode
# Key differences from initial fine-tuning:
# 1. training_mode: continual_learning (explicit setting)
# 2. Learning rate reduced by 20x (2e-5 -> 1e-6)
# 3. Cosine annealing for smooth LR decay
# 4. Same random seed to ensure identical data splits
# 5. Reduced augmentation to avoid disrupting learned features
# 6. More conservative early stopping and patience
# 7. Optimizer state will be loaded from checkpoint (preserves momentum)
# 8. Uses learning_rate from config directly (no factors applied)
# 9. Fewer epochs since model is already well-trained
#
# Expected behavior:
# - Slower but more stable convergence
# - Smaller improvements per epoch
# - Better preservation of existing knowledge
# - Reduced risk of catastrophic forgetting
