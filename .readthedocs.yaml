# Read the Docs build configuration (https://docs.readthedocs.io/en/stable/config-file/v2.html)
version: "2"

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"
  jobs:
    post_checkout: []

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false

python:
  install:
    - method: pip
      path: .
      extra_requirements:
        - docs
