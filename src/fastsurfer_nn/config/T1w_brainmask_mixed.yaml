# ==============================================================================
# PATH CONFIGURATION - Direct Paths (Simpler Format)
# ==============================================================================
# Direct path to training data directory (contains HDF5 files)
TRAINING_DATA_DIR: "/mnt/DataDrive3/xliu/monkey_training_groundtruth/fastsurfer_nn_training/training_data/T1w_seg-brainmask"

# Direct path to output directory (for training logs, checkpoints, etc.)
OUTPUT_DIR: "/mnt/DataDrive3/xliu/monkey_training_groundtruth/fastsurfer_nn_training/training_output/T1w_seg-brainmask_mixed_fov_ras"

# ==============================================================================
# MODEL ARCHITECTURE
# ==============================================================================
MODEL: 
  MODEL_NAME: "FastSurferVINN"
  NUM_CLASSES: 2   # Binary segmentation: 0=background, 1=brain
  LOSS_FUNC: "combined"
  NUM_FILTERS: 71  # Standard FastSurferVINN width for feature learning (output still binary via NUM_CLASSES: 2)
  NUM_FILTERS_INTERPOL: 32
  NUM_CHANNELS: 7
  KERNEL_H: 3
  KERNEL_W: 3
  KERNEL_C: 1
  STRIDE_CONV: 1
  STRIDE_POOL: 2
  POOL: 2
  HEIGHT: 256              # Internal processing = 256
  WIDTH: 256
  INTERPOLATION_MODE: "bilinear"
  CROP_POSITION: "top_left"

TRAIN:
  BATCH_SIZE: 16
  LOG_INTERVAL: 10000
  RESUME: false
  RESUME_EXPR_NUM: "Default"
  NUM_EPOCHS: 100
  NUM_STEPS: 10
  FINE_TUNE: true
  PRETRAINED_MODEL: "/home/star/github/brainana/fastsurfer_nn/pretrained_model/ras_aug/T1w_seg-ARM2_axial.pkl"
  CHECKPOINT_PERIOD: 1
  NUM_WORKERS: 6  # Reduced for network storage I/O optimization
  EARLY_STOPPING: true
  EARLY_STOPPING_MODE: "min"
  EARLY_STOPPING_PATIENCE: 20
  EARLY_STOPPING_WAIT: 10
  EARLY_STOPPING_DELTA: 0.00001

TEST:
  BATCH_SIZE: 16
  EDGE_PADDING_PERCENT: 0.05

# ==============================================================================
# DATA CONFIGURATION
# ==============================================================================
# Note: HDF5 paths are auto-derived from training_data_dir and PLANE
# Structure: {training_data_dir}/{PLANE}_{train|val}.hdf5
# Example: {training_data_dir}/axial_train.hdf5
DATA:
  PLANE: "mixed"           # Training plane: coronal, axial, sagittal, or mixed
  CLASS_OPTIONS: ["brainmask"]      # atlas name
  SIZES: [256]             # Image dimensions (first value used as target_size)
  PADDED_SIZE: 256         # edge padding for better boundary performance
  AUG: [
    "Scaling",
    "Translation",
    "Rotation",
    "Gaussian",
    "BiasField"
    ]
  
  # Individual probabilities for each augmentation (0.0 to 1.0)
  # If not specified, defaults to 0.8
  # Recommended for fine-tuning: moderate geometric augs, conservative aggressive augs
  AUG_PROBABILITIES:
    Scaling: 0.8          # Safe geometric augmentation, helps with size variation
    Translation: 0.7       # Safe geometric augmentation, helps with positioning
    Rotation: 0.7          # Safe geometric augmentation, helps with orientation
    Gaussian: 0.4          # Noise augmentation - lower for fine-tuning (handled separately)
    Elastic: 0.0          # Aggressive deformation - disabled to avoid slow samples (was 0.4)
    RAnisotropy: 0.0       # Simulates acquisition artifacts - disabled to avoid slow samples (was 0.4)
    BiasField: 0.6         # Important for MRI - simulates real bias field artifacts
  
  # ==============================================================================
  # AUGMENTATION PARAMETERS - Configure key parameters for each augmentation
  # ==============================================================================
  # These parameters control the strength/magnitude of each augmentation type
  # If not specified, defaults from defaults.py are used
  
  # Scaling augmentation parameters
  AUG_SCALING:
    SCALES: [0.8, 1.15]  # Scaling range (min, max) - isotropic scaling factor
  
  # Rotation augmentation parameters
  AUG_ROTATION:
    DEGREES: 180  # Random rotation range: ±degrees (e.g., 5 means -5 to +5 degrees)
  
  # Translation augmentation parameters
  AUG_TRANSLATION:
    TRANSLATION: [15.0, 15.0, 0]  # Translation range in pixels (x, y, z)
  
  # Elastic deformation parameters (for performance tuning)
  # Reducing NUM_CONTROL_POINTS from 7 to 5 significantly speeds up Elastic transform
  # Note: With locked_borders=2, torchio requires at least 5 control points
  AUG_ELASTIC:
    NUM_CONTROL_POINTS: 5  # Minimum: 5 with locked_borders=2
    MAX_DISPLACEMENT: [20, 20, 0]  # Max displacement in pixels (x, y, z)
  
  # Random Anisotropy augmentation parameters
  AUG_RANISOTROPY:
    AXES: [0, 1]  # Axes along which to apply anisotropy
    DOWNSAMPLING: [1.1, 1.3]  # Downsampling range (min, max) - reduced from (1.1, 1.5) for better performance
  
  # Bias Field augmentation parameters
  AUG_BIASFIELD:
    COEFFICIENTS: [0.3, 0.7]  # Bias field coefficient range (min, max)
    ORDER: 2  # Polynomial order for bias field (reduced from 3 to 2 for better performance)
  
  # Random Gamma augmentation parameters
  AUG_RGAMMA:
    LOG_GAMMA: [-0.1, 0.1]  # Log gamma range (min, max) for gamma correction

  # ==============================================================================
  # PREPROCESSING - Single Source of Truth for HDF5 Creation, Training & Inference
  # ==============================================================================
  # These parameters control conform() in all three stages:
  # 1. HDF5 creation (train_2_create_hdf5_dataset.py)
  # 2. Training (saved to checkpoint)
  # 3. Inference (reads from checkpoint)
  PREPROCESSING:
    ORIENTATION: "RAS"        # Target orientation (RAS = Right-Anterior-Superior)
    IMG_SIZE: "fov"           # Image size: int (e.g. 256), "fov" (RECOMMENDED), or "cube"
    VOX_SIZE: "min"           # Voxel size: float (e.g. 1.0) or "min" (adaptive)
    DTYPE_IMAGE: "uint8"      # Data type for IMAGES: "uint8" (0-255), "float32", etc.
    DTYPE_LABEL: "int16"      # Data type for LABELS: "int16" or "int32" (supports negative IDs!)
    RESCALE: 255              # Rescale image intensity to [0, RESCALE]
    ORDER_IMAGE: 1            # Interpolation order for images (0=nearest, 1=linear, 3=cubic)
    ORDER_LABEL: 0            # Interpolation order for labels (always 0=nearest)

DATA_LOADER:
  NUM_WORKERS: 6  # Reduced for network storage: fewer workers = less I/O contention
  PIN_MEMORY: true
  PREFETCH_FACTOR: 6  # Increased to hide network latency (workers * prefetch = buffer size)

OPTIMIZER:
  BASE_LR: 0.002
  LR_SCHEDULER: "cosineWarmRestarts"
  GAMMA: 0.3
  STEP_SIZE: 5
  ETA_MIN: 0.00001
  T_ZERO: 10
  T_MULT: 2
  MOMENTUM: 0.9
  DAMPENING: 0.0
  NESTEROV: true
  WEIGHT_DECAY: 0.0001
  OPTIMIZING_METHOD: "adamW"

NUM_GPUS: 1
RNG_SEED: 42

